# Cloudflare Worker (Static Assets model). `npx wrangler deploy` builds this: the static site is
# served via the ASSETS binding and worker.js handles /api/overrides backed by the OVERRIDES KV
# namespace. Files excluded from the static upload are listed in .assetsignore.
#
# One-time setup:
#   1. Create the KV namespace and paste its id below:
#        npx wrangler kv namespace create OVERRIDES        # prints id  (or create it in the dashboard)
#   2. Commit + push, then deploy (the dashboard "Deploy command" is `npx wrangler deploy`).
#   3. Disable the public *.workers.dev route, attach your subdomain, and put a Cloudflare Access
#      application over the whole site (see README). Access is the password protection.

name = "abbots-langley-tithe-map"
main = "worker.js"
compatibility_date = "2024-09-01"

[assets]
directory = "."
binding = "ASSETS"

[[kv_namespaces]]
binding = "OVERRIDES"
id = "REPLACE_WITH_KV_NAMESPACE_ID"
