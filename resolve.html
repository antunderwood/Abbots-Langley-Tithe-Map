<!doctype html>
<html lang="en-GB">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Resolve duplicate labels</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root { --primary:#37496b; --madder:#b0413e; --surface:#fcfbf9; --s2:#f3f1ea; --on:#1c1b19; --var:#4b483f; --outline:#cac6bd; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:Roboto,system-ui,sans-serif; color:var(--on); background:var(--surface); }
    header { padding:14px 20px; background:var(--primary); color:#fff; }
    header h1 { font-family:Fraunces,serif; font-size:20px; margin:0; font-weight:600; }
    main { max-width:680px; margin:0 auto; padding:24px 20px; }
    .progress { font-size:13px; color:var(--var); margin-bottom:12px; }
    .progress b { color:var(--primary); }
    .card { background:var(--s2); border-radius:18px; padding:20px; box-shadow:0 1px 3px rgba(0,0,0,.12); }
    .crop { display:block; width:320px; height:320px; object-fit:cover; image-rendering:pixelated;
      border-radius:12px; background:#fff; margin:0 auto 18px; border:1px solid var(--outline); }
    p.q { text-align:center; color:var(--var); margin:0 0 14px; }
    .opts { display:flex; flex-wrap:wrap; gap:10px; justify-content:center; }
    .opts button { font:inherit; font-weight:500; padding:12px 18px; border:none; border-radius:24px; cursor:pointer;
      background:var(--primary); color:#fff; min-width:96px; }
    .opts button .rec { display:block; font-size:11px; font-weight:400; opacity:.85; margin-top:3px; }
    .alt { display:flex; gap:10px; justify-content:center; margin-top:16px; align-items:center; }
    .alt input { font:inherit; width:110px; padding:8px 10px; border:2px solid var(--outline); border-radius:10px; text-align:center; }
    .alt .ghost { background:transparent; color:var(--var); box-shadow:inset 0 0 0 1px var(--outline); border:none; border-radius:24px; padding:10px 14px; cursor:pointer; font:inherit; }
    .done { text-align:center; padding:40px; font-size:16px; color:var(--var); }
    .saved { position:fixed; bottom:18px; left:50%; transform:translateX(-50%); background:var(--on); color:#fff;
      padding:8px 16px; border-radius:20px; font-size:13px; opacity:0; transition:opacity .2s; pointer-events:none; }
    .saved.show { opacity:.92; }
  </style>
</head>
<body>
  <header><h1>Resolve duplicate labels</h1></header>
  <main>
    <p class="progress"><b id="left">0</b> conflicts left &middot; <span id="done">0</span> resolved</p>
    <div id="wrap"></div>
  </main>
  <div id="toast" class="saved">Saved</div>
  <script>
  const $ = (id) => document.getElementById(id);
  let conflicts = [], confirmed = {}, i = 0, done = 0;
  const toast = (m) => { const t=$("toast"); t.textContent=m; t.classList.add("show"); setTimeout(()=>t.classList.remove("show"),1100); };
  const save = () => fetch("/review/save",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(confirmed)}).then(()=>toast("Saved"));

  // Keep `keep` at this cluster's location, drop the other members.
  async function resolve(c, keep) {
    const base = { sheet: c.sheet, col: c.col, row: c.row };
    // reuse any member's existing lon/lat (all near-identical) so the kept plot stays located
    const any = c.members.map(m => confirmed[m]).find(v => v && v.lon != null);
    if (any) { base.lon = any.lon; base.lat = any.lat; }
    for (const m of c.members) if (m !== keep) delete confirmed[m];
    if (keep) confirmed[keep] = { ...base, ...(confirmed[keep]||{}), sheet: c.sheet, col: c.col, row: c.row, ...(any?{lon:any.lon,lat:any.lat}:{}) };
    c.resolved = true; done++;
    await save(); render();
  }

  function render() {
    const wrap = $("wrap");
    const q = conflicts.filter(c => !c.resolved);
    $("left").textContent = q.length; $("done").textContent = done;
    if (i >= q.length) { wrap.innerHTML = '<div class="done">All resolved. Tell Claude to rebuild with extract_polygons.py.</div>'; return; }
    const c = q[i];
    const btns = c.members.map(m => {
      const r = c.records[m];
      const rec = r ? `<span class="rec">${r.name||"?"}</span>` : '<span class="rec">not a known plot</span>';
      return `<button data-keep="${m}">${m}${rec}</button>`;
    }).join("");
    wrap.innerHTML = `
      <div class="card">
        <img class="crop" src="data/review/${c.crop}" alt="label">
        <p class="q">One label, ${c.members.length} readings. Which number is actually printed?</p>
        <div class="opts">${btns}</div>
        <div class="alt">
          <input id="other" placeholder="other no" inputmode="numeric">
          <button class="ghost" id="bOther">Use this</button>
          <button class="ghost" id="bSkip">Skip</button>
        </div>
      </div>`;
    wrap.querySelectorAll(".opts button").forEach(b => b.onclick = () => resolve(c, b.dataset.keep));
    $("bOther").onclick = () => { const v=$("other").value.trim(); if (v) resolve(c, v); };
    $("bSkip").onclick = () => { i++; render(); };
  }

  Promise.all([
    fetch("data/review/conflicts.json").then(r=>r.json()),
    fetch("data/review/confirmed.json").then(r=>r.json()),
  ]).then(([cf, cn]) => { conflicts=cf; confirmed=cn; render(); })
    .catch(() => { $("wrap").innerHTML = '<div class="done">No conflicts file. Run scripts/find_conflicts.py first.</div>'; });
  </script>
</body>
</html>
